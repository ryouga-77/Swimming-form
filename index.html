<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>撮影情報透かしエディター</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Great+Vibes&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Roboto+Mono:wght@300&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            height: 100vh;
        }

        .main-container {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }

        /* プレビューエリア */
        .preview-area {
            flex: 2;
            background-color: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .camera-container {
            width: 100%;
            padding-top: 177.78%; /* 16:9 縦長アスペクト比 */
            background: linear-gradient(to bottom, #d9a07e 0%, #30333d 100%);
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.5);
        }

        .camera-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none;
        }

        /* 小さくした撮影タイム */
        .camera-time {
            color: white;
            font-size: 14px;
            font-weight: bold;
            position: absolute;
            top: 10px;
            left: 10px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        /* 録画ボタン（元の画像を模倣） */
        .record-button-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .record-outer-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 4px solid white;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0.8;
        }

        .record-inner-square {
            width: 32px;
            height: 32px;
            background-color: #ff4136;
            border-radius: 4px;
        }

        /* 透かし要素のベーススタイル */
        .watermark {
            position: absolute;
            pointer-events: none;
            line-height: 1.2;
            word-wrap: break-word;
        }

        /* 透かしの位置 */
        .top-left { top: 30px; left: 10px; text-align: left; }
        .top-right { top: 10px; right: 10px; text-align: right; }
        .bottom-left { bottom: 30px; left: 10px; text-align: left; }
        .bottom-right { bottom: 10px; right: 10px; text-align: right; }

        /* エディターパネル */
        .editor-panel {
            flex: 1;
            background-color: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .editor-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: #1c1e21;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-size: 0.9rem;
            font-weight: 600;
            color: #65676b;
        }

        textarea {
            width: 100%;
            height: 80px;
            border: 1px solid #dddfe2;
            border-radius: 6px;
            padding: 10px;
            font-size: 14px;
            resize: none;
        }

        .radio-group, .select-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .radio-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        select {
            width: 100%;
            border: 1px solid #dddfe2;
            border-radius: 6px;
            padding: 10px;
            font-size: 14px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        button {
            flex: 1;
            border-radius: 6px;
            padding: 12px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: background-color 0.2s;
        }

        .btn-add {
            background-color: #007bff;
            color: white;
        }

        .btn-add:hover { background-color: #0056b3; }

        .btn-clear {
            background-color: #e4e6eb;
            color: #1c1e21;
        }

        .btn-clear:hover { background-color: #d1d3d8; }

        /* コード出力エリア */
        .code-output-area {
            margin-top: 20px;
            background-color: #282c34;
            color: #abb2bf;
            border-radius: 8px;
            padding: 15px;
            font-family: 'Roboto Mono', monospace;
            font-size: 13px;
            overflow-x: auto;
            position: relative;
        }

        .code-output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            color: #5c6370;
            font-size: 12px;
        }

        .btn-copy {
            background-color: #4b5263;
            color: #abb2bf;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
        }

        .btn-copy:hover { background-color: #5c6370; }

    </style>
</head>
<body>

<div class="main-container">
    <div class="preview-area">
        <div class="editor-title">プレビュー</div>
        <div class="camera-container" id="cameraContainer">
            <div class="camera-overlay">
                <div class="camera-time">00:03</div>

                <div class="record-button-container">
                    <div class="record-outer-circle">
                        <div class="record-inner-square"></div>
                    </div>
                </div>

                <div id="watermarks"></div>
            </div>
        </div>

        <div class="code-output-area">
            <div class="code-output-header">
                <span>生成されたHTMLコード</span>
                <button class="btn-copy" id="copyCode">コードをコピー</button>
            </div>
            <pre id="codeOutput">生成されたコードがここに表示されます...</pre>
        </div>
    </div>

    <div class="editor-panel">
        <div class="editor-title">透かしエディター</div>

        <div class="form-group">
            <label for="watermarkText">透かしテキスト（日時、場所、レンズ情報など）</label>
            <textarea id="watermarkText" placeholder="例: 2023.11.15 14:30\n国立競技場\n50mm f/1.8"></textarea>
        </div>

        <div class="form-group">
            <label>位置</label>
            <div class="radio-group">
                <div class="radio-item"><input type="radio" name="position" value="top-left" id="tl" checked><label for="tl">左上</label></div>
                <div class="radio-item"><input type="radio" name="position" value="top-right" id="tr"><label for="tr">右上</label></div>
                <div class="radio-item"><input type="radio" name="position" value="bottom-left" id="bl"><label for="bl">左下</label></div>
                <div class="radio-item"><input type="radio" name="position" value="bottom-right" id="br"><label for="br">右下</label></div>
            </div>
        </div>

        <div class="form-group">
            <label>不透明度</label>
            <input type="range" id="opacity" min="0" max="100" value="70">
        </div>

        <div class="form-group">
            <label>フォント（おしゃれなフォント）</label>
            <select id="fontFamily">
                <option value="'Dancing Script', cursive">Dancing Script (エレガントな筆記体)</option>
                <option value="'Great Vibes', cursive">Great Vibes (華やかな筆記体)</option>
                <option value="'Playfair Display', serif" selected>Playfair Display (上品なセリフ体)</option>
                <option value="'Roboto Mono', monospace">Roboto Mono (ミニマルな等幅体)</option>
                <option value="sans-serif">標準 (サンセリフ)</option>
            </select>
        </div>

        <div class="form-group">
            <label>フォントサイズ (px)</label>
            <input type="number" id="fontSize" value="16" min="10" max="40">
        </div>

        <div class="button-group">
            <button class="btn-clear" id="clearWatermarks">透かしをクリア</button>
            <button class="btn-add" id="addWatermark">透かしを追加</button>
        </div>
    </div>
</div>

<script>
    const addWatermarkBtn = document.getElementById('addWatermark');
    const clearWatermarksBtn = document.getElementById('clearWatermarks');
    const watermarkTextInput = document.getElementById('watermarkText');
    const opacityInput = document.getElementById('opacity');
    const fontFamilySelect = document.getElementById('fontFamily');
    const fontSizeInput = document.getElementById('fontSize');
    const watermarksArea = document.getElementById('watermarks');
    const codeOutput = document.getElementById('codeOutput');
    const copyCodeBtn = document.getElementById('copyCode');

    // 生成された透かし要素を保存する配列
    let activeWatermarks = [];

    // 透かしを追加する関数
    function addWatermark() {
        const text = watermarkTextInput.value;
        if (!text) {
            alert('透かしテキストを入力してください。');
            return;
        }

        const position = document.querySelector('input[name="position"]:checked').value;
        const opacity = opacityInput.value / 100;
        const fontFamily = fontFamilySelect.value;
        const fontSize = fontSizeInput.value + 'px';

        const watermark = {
            text: text.replace(/\n/g, '<br>'), // 改行をHTMLの改行に変換
            position: position,
            opacity: opacity,
            fontFamily: fontFamily,
            fontSize: fontSize
        };

        activeWatermarks.push(watermark);
        renderWatermarks();
        generateCode();
    }

    // 透かしエリアをクリアする関数
    function clearWatermarks() {
        activeWatermarks = [];
        renderWatermarks();
generateCode();
    }

    // プレビューエリアに透かしを描画する関数
    function renderWatermarks() {
        watermarksArea.innerHTML = ''; // クリア

        activeWatermarks.forEach(wm => {
            const wmDiv = document.createElement('div');
            wmDiv.className = `watermark ${wm.position}`;
            wmDiv.style.color = `rgba(255, 255, 255, ${wm.opacity})`;
            wmDiv.style.fontFamily = wm.fontFamily;
            wmDiv.style.fontSize = wm.fontSize;
            wmDiv.innerHTML = wm.text;
            watermarksArea.appendChild(wmDiv);
        });
    }

    // HTMLコードを生成する関数
    function generateCode() {
        let code = `\n<div class="camera-container" style="width: 100%; padding-top: 177.78%; background: linear-gradient(to bottom, #d9a07e 0%, #30333d 100%); border-radius: 8px; position: relative; overflow: hidden; box-shadow: inset 0 0 100px rgba(0,0,0,0.5);">\n  <div class="camera-overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: space-between; pointer-events: none;">\n    \n    <div class="camera-time" style="color: white; font-size: 14px; font-weight: bold; position: absolute; top: 10px; left: 10px; text-shadow: 1px 1px 2px rgba(0,0,0,0.5);">00:03</div>\n\n    \n    <div class="record-button-container" style="position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; justify-content: center; align-items: center;">\n      <div class="record-outer-circle" style="width: 80px; height: 80px; border-radius: 50%; border: 4px solid white; display: flex; justify-content: center; align-items: center; opacity: 0.8;">\n        <div class="record-inner-square" style="width: 32px; height: 32px; background-color: #ff4136; border-radius: 4px;"></div>\n      </div>\n    </div>\n\n    \n`;

        activeWatermarks.forEach(wm => {
            const positionStyle = getPositionStyle(wm.position);
            code += `    <div class="watermark" style="position: absolute; pointer-events: none; line-height: 1.2; word-wrap: break-word; color: rgba(255, 255, 255, ${wm.opacity}); font-family: ${wm.fontFamily}; font-size: ${wm.fontSize}; ${positionStyle}">${wm.text}</div>\n`;
        });

        code += `  </div>\n</div>`;

        codeOutput.textContent = code;
    }

    // 位置クラスに対応するインラインスタイルを取得するヘルパー関数
    function getPositionStyle(position) {
        switch (position) {
            case 'top-left': return 'top: 30px; left: 10px; text-align: left;';
            case 'top-right': return 'top: 10px; right: 10px; text-align: right;';
            case 'bottom-left': return 'bottom: 30px; left: 10px; text-align: left;';
            case 'bottom-right': return 'bottom: 10px; right: 10px; text-align: right;';
            default: return '';
        }
    }

    // コードをコピーする関数
    function copyCode() {
        const range = document.createRange();
        range.selectNode(codeOutput);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
        document.execCommand('copy');
        window.getSelection().removeAllRanges();
        alert('コードをコピーしました！');
    }

    // イベントリスナーの登録
    addWatermarkBtn.addEventListener('click', addWatermark);
    clearWatermarksBtn.addEventListener('click', clearWatermarks);
    copyCodeBtn.addEventListener('click', copyCode);

    // 初期生成
    generateCode();

</script>

</body>
</html>
